apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ukefu-mysql-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ukefu-mysql
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ukefu-mysql
  template:
    metadata:
      labels:
        app: ukefu-mysql
    spec:
      containers:
      - name: mysql
        image: mysql:5.7
        args:
          - "--ignore-db-dir=lost+found"
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: "123456"
        - name: MYSQL_DATABASE
          value: "ukefu"
        ports:
        - containerPort: 3306
        volumeMounts:
        - name: mysql-data
          mountPath: /var/lib/mysql
          subPath: mysql
      volumes:
      - name: mysql-data
        persistentVolumeClaim:
          claimName: ukefu-mysql-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ukefu-mysql
  namespace: default
spec:
  selector:
    app: ukefu-mysql
  ports:
  - port: 3306
    targetPort: 3306
