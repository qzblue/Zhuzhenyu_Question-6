apiVersion: apps/v1
kind: Deployment
metadata:
  name: ukefu
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ukefu
  template:
    metadata:
      labels:
        app: ukefu
    spec:
      containers:
      - name: ukefu
        # 修改为 GitHub Container Registry 地址
        image: ghcr.io/qzblue/ukefu:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://ukefu-mysql:3306/ukefu?useUnicode=true&characterEncoding=UTF-8"
        - name: SPRING_DATASOURCE_USERNAME
          value: "root"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "123456"
        - name: SPRING_DATA_ELASTICSEARCH_CLUSTER_NODES
          value: "ukefu-es:9300"
        - name: SERVER_PORT
          value: "8080"
---
apiVersion: v1
kind: Service
metadata:
  name: ukefu
  namespace: default
spec:
  type: NodePort
  selector:
    app: ukefu
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30085
