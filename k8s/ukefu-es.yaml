apiVersion: apps/v1
kind: Deployment
metadata:
  name: ukefu-es
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ukefu-es
  template:
    metadata:
      labels:
        app: ukefu-es
    spec:
      containers:
      - name: elasticsearch
        image: ghcr.io/qzblue/elasticsearch:1.7.2
        ports:
        - containerPort: 9200
        - containerPort: 9300
---
apiVersion: v1
kind: Service
metadata:
  name: ukefu-es
  namespace: default
spec:
  selector:
    app: ukefu-es
  ports:
  - name: http
    port: 9200
    targetPort: 9200
  - name: transport
    port: 9300
    targetPort: 9300
