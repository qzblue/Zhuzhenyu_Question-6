name: Build and Push Ukefu Docker Image

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout our infra repository
        uses: actions/checkout@v4
        with:
          path: infra

      - name: Checkout Ukefu repository
        uses: actions/checkout@v4
        with:
          repository: jiangbaojun/ukefu
          ref: master
          path: ukefu

      - name: Copy Dockerfile to Ukefu
        run: cp infra/Dockerfile ukefu/Dockerfile

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract lowercase repository owner
        id: owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./ukefu
          file: ./ukefu/Dockerfile
          push: true
          tags: ghcr.io/${{ env.owner }}/ukefu:latest
          labels: |
            org.opencontainers.image.source=https://github.com/qzblue/Zhuzhenyu_Question-6

      - name: Retag and push Elasticsearch
        run: |
          docker pull elasticsearch:1.7.2
          docker tag elasticsearch:1.7.2 ghcr.io/${{ env.owner }}/elasticsearch:1.7.2
          docker push ghcr.io/${{ env.owner }}/elasticsearch:1.7.2
